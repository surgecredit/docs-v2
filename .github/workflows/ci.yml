name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: docs/dist
          retention-days: 7
          if-no-files-found: ignore

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Audit (fail on high severity)
        run: |
          # `pnpm audit` calls npm's legacy audit endpoint, which was retired and now
          # returns HTTP 410 — so it fails on every run regardless of the dependency
          # tree. Audit through npm's bulk advisory endpoint instead: resolve a
          # lockfile from package.json without installing, then audit prod deps only.
          npm install --package-lock-only --ignore-scripts
          npm audit --omit=dev --audit-level=high
